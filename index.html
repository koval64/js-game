<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Snake Canvas</title>
    <link rel="stylesheet" href="style.css?v=20260617-layouts14">
  </head>
  <body>
    <main class="game-shell">
      <section class="game-panel" aria-labelledby="game-title">
        <div class="topbar">
          <div>
            <p class="eyebrow">Canvas game</p>
            <h1 id="game-title">Snake</h1>
          </div>

        </div>

        <div class="board-wrap">
          <canvas id="game" width="480" height="480" aria-label="Snake game board"></canvas>
          <div class="status" id="status" aria-live="polite">Ready</div>
        </div>

        <div class="controls">
          <div class="score-chip" aria-label="Game score">
            <span>Score</span>
            <strong id="score">0</strong>
          </div>
          <button type="button" id="start-button">Start</button>
          <button type="button" id="reset-button">Restart</button>
          <button type="button" id="layout-button">Layout 12</button>
        </div>

        <div class="d-pad" data-layout="turn-two" aria-label="Touch controls">
          <button type="button" data-turn-slot="left-normal" data-turn="left" aria-label="Turn left">&#8634;</button>
          <button type="button" data-turn-slot="right-normal" data-turn="right" aria-label="Turn right">&#8635;</button>
          <button type="button" data-turn-slot="left-swapped" data-turn="right" aria-label="Turn right">&#8635;</button>
          <button type="button" data-turn-slot="right-swapped" data-turn="left" aria-label="Turn left">&#8634;</button>
        </div>
      </section>
    </main>

    <script src="game.js?v=20260617-layouts14"></script>
  </body>
</html>
