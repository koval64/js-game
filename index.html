<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Snake Canvas</title>
    <link rel="stylesheet" href="style.css?v=20260616-layouts8">
  </head>
  <body>
    <main class="game-shell">
      <section class="game-panel" aria-labelledby="game-title">
        <div class="topbar">
          <div>
            <p class="eyebrow">Canvas game</p>
            <h1 id="game-title">Snake</h1>
          </div>

        </div>

        <div class="board-wrap">
          <canvas id="game" width="480" height="480" aria-label="Snake game board"></canvas>
          <div class="status" id="status" aria-live="polite">Ready</div>
        </div>

        <div class="controls">
          <div class="score-chip" aria-label="Game score">
            <span>Score</span>
            <strong id="score">0</strong>
          </div>
          <button type="button" id="start-button">Start</button>
          <button type="button" id="reset-button">Restart</button>
          <button type="button" id="layout-button">Layout 1</button>
        </div>

        <div class="d-pad" data-layout="classic" aria-label="Touch controls">
          <button type="button" data-control="primary" data-direction="up" aria-label="Up">&uarr;</button>
          <button type="button" data-control="primary" data-direction="left" aria-label="Left">&larr;</button>
          <button type="button" data-control="primary" data-direction="down" aria-label="Down">&darr;</button>
          <button type="button" data-control="primary" data-direction="right" aria-label="Right">&rarr;</button>
          <button type="button" data-layout-extra="wide-double grid-4x3" data-extra-slot="left-bottom" data-direction="left" aria-label="Left">&larr;</button>
          <button type="button" data-layout-extra="wide-double grid-4x3 turn-hybrid" data-extra-slot="up-top" data-direction="up" aria-label="Up">&uarr;</button>
          <button type="button" data-layout-extra="wide-double grid-4x3" data-extra-slot="down-bottom" data-direction="down" aria-label="Down">&darr;</button>
          <button type="button" data-layout-extra="wide-double grid-4x3" data-extra-slot="right-bottom" data-direction="right" aria-label="Right">&rarr;</button>
          <button type="button" data-layout-extra="grid-4x3" data-extra-slot="up-top-3" data-direction="up" aria-label="Up">&uarr;</button>
          <button type="button" data-layout-extra="grid-4x3" data-extra-slot="up-top-4" data-direction="up" aria-label="Up">&uarr;</button>
          <button type="button" data-layout-extra="grid-4x3" data-extra-slot="down-bottom-3" data-direction="down" aria-label="Down">&darr;</button>
          <button type="button" data-layout-extra="grid-4x3" data-extra-slot="down-bottom-4" data-direction="down" aria-label="Down">&darr;</button>
          <button type="button" data-layout-extra="turn-sides turn-sides-swapped turn-hybrid" data-turn-slot="top-left" data-turn="left" aria-label="Turn left">&#8634;</button>
          <button type="button" data-layout-extra="turn-sides turn-sides-swapped turn-hybrid" data-turn-slot="top-right" data-turn="right" aria-label="Turn right">&#8635;</button>
          <button type="button" data-layout-extra="turn-sides turn-sides-swapped turn-hybrid" data-turn-slot="bottom-left" data-turn="right" aria-label="Turn right">&#8635;</button>
          <button type="button" data-layout-extra="turn-sides turn-sides-swapped turn-hybrid" data-turn-slot="bottom-right" data-turn="left" aria-label="Turn left">&#8634;</button>
        </div>
      </section>
    </main>

    <script src="game.js?v=20260616-layouts8"></script>
  </body>
</html>
